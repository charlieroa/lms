<style>
:root{--accent:#F0502E;--accent2:#FF7A4D;--bg:#FFFFFF;--panel:#FBF8F3;--card:#FFFFFF;--card2:#F4EFE7;--line:rgba(0,0,0,.08);--line2:rgba(0,0,0,.14);--txt:#15171C;--mut:#5C6069;--mut2:#8A909C}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--txt);font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100%;display:flex;align-items:center;justify-content:center}
button{font-family:inherit}
::-webkit-scrollbar{width:0}
@keyframes resPulse{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.5);opacity:0}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ring{0%{transform:scale(.45);opacity:.55}100%{transform:scale(1.9);opacity:0}}
@keyframes scn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#phone{display:flex;flex-direction:column;height:100%;width:100%;background:var(--bg);overflow:hidden}
#screen{flex:1;overflow-y:auto;overflow-x:hidden}
.scn{animation:scn .42s cubic-bezier(.2,.7,.3,1)}
#topnav{display:none}

/* ===== layout responsive: grids que cambian entre app (móvil) y web (escritorio) ===== */
.scr{padding:26px 22px 34px}
.g1{display:grid;grid-template-columns:1fr;gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.home-cont{display:block;background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.home-vid{position:relative;height:170px}
.home-user{position:relative;flex-shrink:0}
.pf-player{display:grid;grid-template-columns:1fr;gap:0}
.pf-aside{margin-top:34px;border-top:1px solid var(--line);background:var(--panel);margin-left:-22px;margin-right:-22px;padding:20px 16px}
.g-dash{display:grid;grid-template-columns:1fr;gap:16px}
.res-feat{display:grid;grid-template-columns:1fr;background:linear-gradient(150deg,var(--card),var(--panel));border:1px solid var(--line);border-radius:20px;overflow:hidden}
.res-fig{position:relative;height:170px;background:linear-gradient(160deg,#1C2433,#0C0F17);display:flex;align-items:center;justify-content:center}

/* ===== MODO WEB (escritorio): barra superior, ancho completo, varias columnas ===== */
@media(min-width:900px){
  html,body{height:auto}
  body{display:block;background:#fff;padding:0;min-height:100vh}
  #phone{height:auto;min-height:100vh;max-width:none;border-radius:0;border:0;box-shadow:none;overflow:visible}
  #screen{overflow:visible}
  #statusbar{display:none!important}
  #bottomnav{display:none!important}
  #topnav{display:flex;flex-shrink:0;position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .scr{max-width:1180px;margin:0 auto;padding:46px 40px 90px}
  .scr.narrow{max-width:1000px}
  .g1,.g2{grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
  .home-user{display:none}
  .home-cont{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr)}
  .home-vid{height:auto;min-height:300px}
  .pf-player{grid-template-columns:minmax(0,1fr) 340px;gap:34px;align-items:start}
  .pf-aside{margin:0;border-top:0;border-left:1px solid var(--line);background:var(--panel);padding:24px 20px;border-radius:16px;position:sticky;top:88px}
  .g-dash{grid-template-columns:minmax(0,1.25fr) minmax(0,1fr);align-items:start;gap:20px}
  .res-feat{grid-template-columns:minmax(0,1fr) 300px}
  .res-fig{height:auto}
}
</style>

  +'<button onclick="app.toggleComplete()" style="margin-top:18px;display:inline-flex;align-items:center;gap:9px;background:'+(isDone?'rgba(86,197,150,.14)':'var(--accent)')+';color:'+(isDone?'#3FA877':'#fff')+';border:1px solid '+(isDone?'rgba(86,197,150,.4)':'transparent')+';cursor:pointer;padding:13px 20px;border-radius:11px;font:700 14px \'Hanken Grotesk\'"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> '+(isDone?'Completada':'Marcar completada')+'</button>'
  +'<div style="display:flex;gap:6px;margin:26px 0 22px;border-bottom:1px solid var(--line)">'+tabs+'</div>'
  +'<div>'+body+'</div></div>'
  +'<aside class="pf-aside"><div style="display:flex;align-items:center;justify-content:space-between;padding:0 6px 14px"><span style="font:700 14px \'Hanken Grotesk\'">Contenido del curso</span><span style="font:500 12px \'Hanken Grotesk\';color:var(--accent)">'+p.pct+'%</span></div>'+outline+'</aside></div></main>';
}

function viewDashboard(){
  var p=progress();
  var sum=0;ZONES.forEach(function(z){sum+=state.levels[z.id];});var avg=(sum/ZONES.length).toFixed(1);
  var stats=[
    {label:'Progreso del curso',value:p.pct+'%',sub:p.done+' de '+p.total+' clases',color:'var(--accent)'},
    {label:'Tensión promedio',value:avg,sub:'sobre 3 · '+WEEKS[state.weekSel].label,color:'var(--txt)'},
    {label:'Sesiones registradas',value:String(state.sessions.length),sub:'en tu diario',color:'var(--txt)'},
    {label:'Racha',value:'5',sub:'días seguidos',color:'var(--txt)'},
  ].map(function(s){return '<div style="padding:20px;background:var(--card);border:1px solid var(--line);border-radius:16px"><div style="font:500 12.5px \'Hanken Grotesk\';color:var(--mut)">'+s.label+'</div><div style="font:800 30px/1 \'Plus Jakarta Sans\';margin-top:8px;color:'+s.color+'">'+s.value+'</div><div style="font:500 12px \'Hanken Grotesk\';color:var(--mut2);margin-top:6px">'+s.sub+'</div></div>';}).join('');
  var weekTabs=WEEKS.map(function(w){var on=state.weekSel===w.id;return '<button onclick="app.setWeek('+w.id+')" style="background:'+(on?'var(--accent)':'transparent')+';color:'+(on?'#fff':'var(--mut)')+';border:none;cursor:pointer;padding:7px 12px;border-radius:7px;font:600 12px \'Hanken Grotesk\'">'+w.label+'</button>';}).join('');
  var dots=ZONES.map(function(z){var lv=state.levels[z.id];var c=HEAT[lv];var size=(12+lv*4);return '<button onclick="app.cycleZone(\''+z.id+'\')" title="'+z.label+'" style="position:absolute;top:'+z.top+';left:'+z.left+';transform:translate(-50%,-50%);width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+c+';border:2px solid rgba(255,255,255,.9);cursor:pointer;box-shadow:0 0 0 '+(lv*2)+'px '+hexA(c,.4)+';transition:all .2s"></button>';}).join('');
  var legendRows=ZONES.map(function(z){var lv=state.levels[z.id];var c=HEAT[lv];return '<button onclick="app.cycleZone(\''+z.id+'\')" style="display:flex;align-items:center;gap:12px;width:100%;padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;cursor:pointer;text-align:left"><span style="width:11px;height:11px;border-radius:50%;flex-shrink:0;background:'+c+'"></span><span style="flex:1;font:600 13.5px \'Hanken Grotesk\'">'+z.label+'</span><span style="font:600 11px \'Hanken Grotesk\';color:'+c+';padding:3px 9px;border-radius:20px;background:'+hexA(c,.14)+'">'+LEVELS[lv]+'</span></button>';}).join('');
  var scale=LEVELS.map(function(l,i){return '<span style="display:inline-flex;align-items:center;gap:6px;font:500 11px \'Hanken Grotesk\';color:var(--mut2)"><span style="width:9px;height:9px;border-radius:50%;background:'+HEAT[i]+'"></span>'+l+'</span>';}).join('');
  var evo=ZONES.map(function(z){var cells=z.evo.map(function(v){return '<div style="flex:1;height:9px;border-radius:6px;background:rgba(0,0,0,.06);overflow:hidden"><div style="height:100%;width:'+((v/3)*100)+'%;background:'+HEAT[v]+';border-radius:6px"></div></div>';}).join('');return '<div style="display:grid;grid-template-columns:74px 1fr;gap:12px;align-items:center"><span style="font:600 12.5px \'Hanken Grotesk\'">'+z.label+'</span><div style="display:flex;align-items:center;gap:6px">'+cells+'</div></div>';}).join('');
  var entries=state.sessions.map(function(s){var items=[[DQ[0],s.a1],[DQ[1],s.a2],[DQ[2],s.a3]].map(function(qi){return '<div><div style="font:500 11.5px/1.3 \'Hanken Grotesk\';color:var(--mut2);margin-bottom:5px">'+qi[0]+'</div><div style="font:400 14px/1.45 \'Hanken Grotesk\';color:#2A2D35">'+esc(qi[1])+'</div></div>';}).join('');return '<div style="border:1px solid var(--line);border-radius:14px;padding:16px 18px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font:600 13px \'Hanken Grotesk\'">'+s.title+'</span><span style="font:500 11.5px \'JetBrains Mono\';color:var(--mut2)">'+s.date+'</span></div><div style="display:flex;flex-direction:column;gap:12px">'+items+'</div></div>';}).join('');
  return '<main class="scn scr">'
  +'<h1 style="margin:0 0 6px;font:700 28px/1.12 \'Plus Jakarta Sans\';letter-spacing:-.01em">Tu progreso</h1>'
  +'<p style="margin:0 0 26px;font:400 15px \'Hanken Grotesk\';color:var(--mut)">Tu evolución y tus sensaciones — no las clases. Para las clases, ve a <strong style="color:var(--txt);font-weight:600">Mi curso</strong>.</p>'
  +'<div class="g2" style="margin-bottom:24px">'+stats+'</div>'
  +'<div class="g-dash">'
  +'<section style="background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px"><div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between;margin-bottom:6px"><div><h2 style="margin:0;font:600 18px \'Hanken Grotesk\'">Mapa de Tensión</h2><p style="margin:4px 0 0;font:400 13px \'Hanken Grotesk\';color:var(--mut)">Toca una zona para registrar su nivel.</p></div><div style="display:flex;gap:4px;padding:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px">'+weekTabs+'</div></div>'
  +'<div style="display:flex;justify-content:center;margin:18px 0"><div style="position:relative;width:200px;height:320px"><svg width="200" height="320" viewBox="0 0 200 320" fill="none"><path d="M100 18 C84 18 73 31 73 49 C73 60 77 69 84 75 C80 78 70 82 70 92 L66 99 C58 103 50 110 46 124 L36 168 C34 178 44 183 49 174 L60 138 L62 150 C58 176 56 210 58 250 C59 272 62 296 66 312 C68 318 86 318 87 311 L94 250 L100 250 L106 250 L113 311 C114 318 132 318 134 312 C138 296 141 272 142 250 C144 210 142 176 138 150 L140 138 L151 174 C156 183 166 178 164 168 L154 124 C150 110 142 103 134 99 L130 92 C130 82 120 78 116 75 C123 69 127 60 127 49 C127 31 116 18 100 18 Z" fill="rgba(0,0,0,.04)" stroke="rgba(0,0,0,.14)" stroke-width="1.4"/></svg>'+dots+'</div></div>'
  +'<div style="display:flex;flex-direction:column;gap:7px">'+legendRows+'<div style="display:flex;gap:14px;margin-top:8px;padding:0 4px;flex-wrap:wrap">'+scale+'</div></div></section>'
  +'<section style="background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;margin-bottom:18px"><h2 style="margin:0;font:600 18px \'Hanken Grotesk\'">Mi evolución</h2><p style="margin:4px 0 20px;font:400 13px \'Hanken Grotesk\';color:var(--mut)">Tensión por zona · semanas 1 · 4 · 8</p><div style="display:flex;flex-direction:column;gap:13px">'+evo+'</div><div style="display:flex;justify-content:space-between;margin-top:12px;padding-left:86px;font:500 11px \'JetBrains Mono\';color:var(--mut2)"><span>S1</span><span>S4</span><span>S8</span></div><blockquote style="margin:22px 0 0;padding:14px 16px;background:var(--panel);border-radius:12px;font:400 16px/1.4 \'Newsreader\',serif;font-style:italic;color:var(--mut)">«Mientras más clara es la sensación, más claro es el control sobre la voz.»</blockquote></section></div>'
  +'<section style="background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;margin-top:18px"><div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px"><div><h2 style="margin:0;font:600 18px \'Hanken Grotesk\'">Diario de práctica</h2><p style="margin:4px 0 0;font:400 13px \'Hanken Grotesk\';color:var(--mut)">Registra tus observaciones después de cada sesión.</p></div><span style="font:500 13px \'Hanken Grotesk\';color:var(--accent)">'+state.sessions.length+'</span></div>'
  +'<div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px"><div style="font:600 13px \'Hanken Grotesk\';margin-bottom:12px;color:var(--mut)">Nueva sesión</div><div style="display:flex;flex-direction:column;gap:10px"><input value="'+esc(state.draft.q1)+'" oninput="app.draft(\'q1\',this.value)" placeholder="'+DQ[0]+'" style="background:var(--card);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font:400 14px \'Hanken Grotesk\';color:var(--txt);outline:none"/><input value="'+esc(state.draft.q2)+'" oninput="app.draft(\'q2\',this.value)" placeholder="'+DQ[1]+'" style="background:var(--card);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font:400 14px \'Hanken Grotesk\';color:var(--txt);outline:none"/><input value="'+esc(state.draft.q3)+'" oninput="app.draft(\'q3\',this.value)" placeholder="'+DQ[2]+'" style="background:var(--card);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font:400 14px \'Hanken Grotesk\';color:var(--txt);outline:none"/></div><button onclick="app.addSession()" style="margin-top:14px;display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;padding:11px 20px;border-radius:10px;font:700 13.5px \'Hanken Grotesk\'"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Guardar sesión</button></div>'
  +'<div style="display:flex;flex-direction:column;gap:12px">'+entries+'</div></section></main>';
}

function viewResources(){
  var pages=PDF_PAGES.map(function(pg){return '<span style="font:500 12px \'Hanken Grotesk\';color:var(--mut);padding:6px 12px;background:rgba(0,0,0,.035);border:1px solid var(--line);border-radius:20px">'+pg+'</span>';}).join('');
  var other=OTHER_RES.map(function(r){return '<div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;display:flex;flex-direction:column"><div style="width:44px;height:44px;border-radius:11px;background:var(--card2);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px">'+r.icon+'</div><div style="font:600 16px \'Hanken Grotesk\';margin-bottom:6px">'+r.title+'</div><div style="flex:1;font:400 13.5px/1.5 \'Hanken Grotesk\';color:var(--mut);margin-bottom:16px">'+r.desc+'</div><button style="align-self:flex-start;background:rgba(0,0,0,.04);color:var(--txt);border:1px solid var(--line2);cursor:pointer;padding:9px 16px;border-radius:9px;font:600 13px \'Hanken Grotesk\'">'+r.action+'</button></div>';}).join('');
  return '<main class="scn scr narrow">'
  +'<h1 style="margin:0 0 6px;font:700 28px/1.12 \'Plus Jakarta Sans\';letter-spacing:-.01em">Recursos descargables</h1>'
  +'<p style="margin:0 0 26px;font:400 15px \'Hanken Grotesk\';color:var(--mut)">Materiales para acompañar tu práctica fuera de cámara.</p>'
  +'<div class="res-feat" style="margin-bottom:24px">'
  +'<div style="padding:28px 24px"><div style="font:500 11.5px \'JetBrains Mono\';letter-spacing:.2em;color:var(--accent)">HERRAMIENTA PRINCIPAL</div><h2 style="margin:12px 0 10px;font:700 22px/1.12 \'Plus Jakarta Sans\'">Autodiagnóstico — Mapa de Tensión</h2><p style="margin:0 0 18px;font:400 15px/1.6 \'Hanken Grotesk\';color:var(--mut)">Completa el escaneo justo después del Video 3 — Diagnóstico. Guárdalo durante todo el curso: al final vas a ver cuánto cambió tu instrumento.</p><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">'+pages+'</div><button style="display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;cursor:pointer;padding:14px 22px;border-radius:12px;font:700 14.5px \'Hanken Grotesk\'"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Descargar PDF</button></div>'
  +'<div class="res-fig"><div style="width:130px;height:170px;background:#F4F1EA;border-radius:6px;box-shadow:0 20px 50px -10px rgba(0,0,0,.6);transform:rotate(-4deg);padding:14px"><div style="font:700 6.5px \'Hanken Grotesk\';letter-spacing:.1em;color:#0A0D15">THE RESONANCE METHOD</div><div style="font:800 10px \'Plus Jakarta Sans\';color:#0A0D15;margin-top:9px;line-height:1.1">Mapa de Tensión</div><div style="margin-top:12px;display:flex;flex-direction:column;gap:6px"><div style="height:5px;width:80%;background:rgba(10,13,21,.12);border-radius:3px"></div><div style="height:5px;width:60%;background:rgba(10,13,21,.12);border-radius:3px"></div><div style="height:5px;width:72%;background:rgba(240,80,46,.5);border-radius:3px"></div><div style="height:5px;width:50%;background:rgba(10,13,21,.12);border-radius:3px"></div></div></div></div></div>'
  +'<div class="g1">'+other+'</div></main>';
}

/* ============ RENDER ============ */
function renderBottomNav(){
  var nav=document.getElementById('bottomnav');
  if(state.screen==='welcome'||state.screen==='login'){nav.style.display='none';return;}
  nav.style.display='flex';
  nav.innerHTML=BOTTOM.map(function(b){
    var active=(b.id===state.screen)||(b.id==='course'&&state.screen==='player');
    var color=active?'var(--accent)':'#969CAC';
    return '<button onclick="app.go(\''+b.id+'\')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:'+color+';padding:4px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="'+b.d+'"/></svg><span style="font:600 10px \'Hanken Grotesk\'">'+b.label+'</span></button>';
  }).join('');
}
function userMenu(mode){
  var anchor = mode==='web'
    ? '<button onclick="app.toggleMenu()" style="display:flex;align-items:center;gap:9px;padding:5px 13px 5px 6px;background:var(--card);border:1px solid var(--line);border-radius:30px;cursor:pointer"><span style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#FFE0D6,#FFB59E);display:flex;align-items:center;justify-content:center;font:600 11px \'Plus Jakarta Sans\';color:#B23A1E">VM</span><span style="font:600 12.5px \'Hanken Grotesk\';color:var(--mut)">Valentina</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--mut)" stroke-width="2.2"><path d="M6 9l6 6 6-6"/></svg></button>'
    : '<button onclick="app.toggleMenu()" style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#FFE0D6,#FFB59E);border:1px solid var(--line);cursor:pointer;font:700 14px \'Plus Jakarta Sans\';color:#B23A1E">VM</button>';
  var drop = state.menu ? '<div style="position:absolute;right:0;top:'+(mode==='web'?'50px':'52px')+';z-index:40;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 44px -16px rgba(0,0,0,.3);padding:8px;min-width:212px;text-align:left"><div style="padding:10px 12px 12px"><div style="font:700 14px \'Plus Jakarta Sans\'">Valentina Méndez</div><div style="font:400 12.5px \'Hanken Grotesk\';color:var(--mut);margin-top:2px">valentina@email.com</div></div><button onclick="app.logout()" style="width:100%;display:flex;align-items:center;gap:10px;background:none;border:none;border-top:1px solid var(--line);cursor:pointer;padding:12px;font:600 14px \'Hanken Grotesk\';color:#D8431F;text-align:left"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Cerrar sesión</button></div>' : '';
  var backdrop = state.menu ? '<div onclick="app.toggleMenu()" style="position:fixed;inset:0;z-index:35"></div>' : '';
  return '<div style="position:relative;'+(mode==='web'?'margin-left:auto':'')+'">'+backdrop+anchor+drop+'</div>';
}
function renderTopNav(){
  var nav=document.getElementById('topnav');
  if(state.screen==='welcome'||state.screen==='login'){nav.style.display='none';nav.innerHTML='';return;}
  nav.style.display='';
  var items=[['home','Inicio'],['course','Mi curso'],['dashboard','Progreso'],['resources','Recursos']];
  var links=items.map(function(it){var active=(it[0]===state.screen)||(it[0]==='course'&&state.screen==='player');return '<button onclick="app.go(\''+it[0]+'\')" style="background:'+(active?'rgba(0,0,0,.06)':'transparent')+';color:'+(active?'var(--txt)':'var(--mut)')+';border:none;cursor:pointer;padding:8px 15px;border-radius:9px;font:600 13.5px \'Hanken Grotesk\'">'+it[1]+'</button>';}).join('');
  nav.innerHTML='<div style="display:flex;align-items:center;gap:24px;width:100%;max-width:1180px;margin:0 auto;padding:0 40px;height:64px"><button onclick="app.go(\'home\')" style="display:flex;align-items:center;gap:11px;background:none;border:none;cursor:pointer;padding:0">'+LOGO+'<span style="text-align:left;line-height:1"><span style="display:block;font:700 13px/1 \'Plus Jakarta Sans\';letter-spacing:.16em">RESONANCE</span><span style="display:block;font:500 9px/1.4 \'JetBrains Mono\';letter-spacing:.34em;color:var(--accent)">M E T H O D</span></span></button><nav style="display:flex;gap:4px;margin-left:6px">'+links+'</nav>'+userMenu('web')+'</div>';
}
function render(){
  var s=document.getElementById('screen');
  var v=state.screen;
  if(v==='welcome')s.innerHTML=viewWelcome();
  else if(v==='login')s.innerHTML=viewLogin();
  else if(v==='home')s.innerHTML=viewHome();
  else if(v==='course')s.innerHTML=viewCourse();
  else if(v==='player')s.innerHTML=viewPlayer();
  else if(v==='dashboard')s.innerHTML=viewDashboard();
  else if(v==='resources')s.innerHTML=viewResources();
  renderBottomNav();
  renderTopNav();
}
// Entrada directa: app.html#home (p.ej. tras el pago) salta la bienvenida y va a la plataforma
(function(){
  var h=(location.hash||'').replace('#','');
  if(['home','course','dashboard','resources','login','welcome'].indexOf(h)>=0) state.screen=h;
})();
render();
</script>
